<div class="container mt-4">
  <h2 class="text-center mb-4">Add New Job</h2>

  <div class="card p-4 shadow-sm">
    <form (ngSubmit)="onSubmit()">
      <!-- Company Name -->
      <div class="mb-3">
        <label for="company" class="form-label">Company Name</label>
        <input
          type="text"
          id="company"
          class="form-control"
          name="company required"
        />
      </div>

      <!-- Job Position -->
      <div class="mb-3">
        <label for="position" class="form-label">Job Position</label>
        <input
          type="text"
          id="position"
          class="form-control"
          name="position"
          required
        />
      </div>

      <!-- Location -->
      <div class="mb-3">
        <label for="location" class="form-label">Location</label>
        <input
          type="text"
          id="location"
          class="form-control"
          name="location"
          required
        />
      </div>

      <!-- Job Status -->
      <div class="mb-3">
        <label for="status" class="form-label">Status</label>
        <select id="status" class="form-select" name="status" required>
          <option value="Applied">Applied</option>
          <option value="Call">First Call</option>
          <option value="Interview">Interview</option>
          <option value="Rejected">Rejected</option>
        </select>
      </div>

      <!-- Date Applied -->
      <div class="mb-3">
        <label for="date" class="form-label">Date Applied</label>
        <input
          type="date"
          id="date"
          class="form-control"
          name="dateApplied"
          required
        />
      </div>

      <!-- Job Link -->
      <div class="mb-3">
        <label for="link" class="form-label">Job Link</label>
        <input type="url" id="link" class="form-control" name="link" />
      </div>

      <!-- Button -->
      <div class="d-flex justify-content-between">
        <button
          type="button"
          class="btn btn-outline-secondary"
          [routerLink]="['/job/list']"
        >
          Cancel
        </button>
        <button type="submit" class="btn btn-primary">Save Job</button>
      </div>
    </form>
  </div>
</div>
