<div class="container mt-4">
  <h2 class="text-center mb-4">Login</h2>

  <div class="card p-4 shadow-sm mx-auto" style="max-width: 400px">
    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      <!-- Email Field -->
      <div class="mb-3">
        <label for="email" class="form-label">Email</label>
        <input
          type="email"
          id="email"
          class="form-control"
          formControlName="email"
          required
        />
        <div
          *ngIf="loginForm.get('email')?.touched && loginForm.get('email')?.errors?.['required']"
          class="text-danger"
        >
          Email is required.
        </div>
        <div
          *ngIf="loginForm.get('email')?.touched && loginForm.get('email')?.errors?.['email']"
          class="text-danger"
        >
          Please enter a valid email address.
        </div>
      </div>

      <!-- Password Field -->
      <div class="mb-3">
        <label for="password" class="form-label">Password</label>
        <input
          type="password"
          id="password"
          class="form-control"
          formControlName="password"
          required
        />
        <div
          *ngIf="loginForm.get('password')?.touched && loginForm.get('password')?.errors?.['required']"
          class="text-danger"
        >
          Password is required.
        </div>
        <div
          *ngIf="loginForm.get('password')?.touched && loginForm.get('password')?.errors?.['minlength']"
          class="text-danger"
        >
          Password must be at least 8 characters long.
        </div>
      </div>

      <!-- Button -->
      <div class="d-flex justify-content-between">
        <button
          type="button"
          class="btn btn-outline-secondary"
          (click)="cancel()"
        >
          Cancel
        </button>
        <button type="submit" class="btn btn-primary">Login</button>
      </div>
    </form>

    <!-- Additional Links -->
    <div class="mt-3 text-center">
      <a routerLink="/auth/forgot-password" class="text-primary"
        >Forgot Password?</a
      >
    </div>
    <div class="mt-2 text-center">
      <span>Don't have an account? </span>
      <a routerLink="/auth/signup" class="text-primary">Sign up here!</a>
    </div>
  </div>
</div>
