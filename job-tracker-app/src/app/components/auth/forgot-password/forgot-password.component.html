<div class="container mt-4">
  <h2 class="text-center mb-4">Forgot Password</h2>

  <div class="card p-4 shadow-sm mx-auto" style="max-width: 400px">
    <form [formGroup]="forgotPasswordForm" (ngSubmit)="onSubmit()">
      <!-- Email Field -->
      <div class="mb-3">
        <label for="email" class="form-label">Email</label>
        <input
          type="email"
          id="email"
          class="form-control"
          formControlName="email"
          required
        />
        <small
          *ngIf="forgotPasswordForm.get('email')?.touched && forgotPasswordForm.get('email')?.errors?.['required']"
          class="text-danger"
        >
          Email is required.
        </small>
        <small
          *ngIf="forgotPasswordForm.get('email')?.touched && forgotPasswordForm.get('email')?.errors?.['email']"
          class="text-danger"
        >
          Please enter a valid email address.
        </small>
      </div>

      <!-- Button -->
      <div class="d-flex justify-content-between">
        <button
          type="button"
          class="btn btn-outline-secondary"
          (click)="goToLogin()"
        >
          Back to Login
        </button>
        <button
          type="submit"
          class="btn btn-primary"
          [disabled]="forgotPasswordForm.invalid"
        >
          Submit
        </button>
      </div>
    </form>
  </div>
</div>
